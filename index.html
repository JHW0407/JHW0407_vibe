<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Inner Type</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">

    <div id="start-screen" class="card">
      <h1>✨ My Inner Type ✨</h1>
      <p>
        12개의 질문으로 알아보는<br>
        당신의 숨겨진 성격 유형
      </p>

      <button onclick="startTest()">테스트 시작</button>
    </div>

    <div id="question-screen" class="hidden card">
      <div class="progress">
        <div id="progress-bar"></div>
      </div>

      <h2 id="question"></h2>

      <div class="answers">
        <button onclick="answer('A')">매우 그렇다</button>
        <button onclick="answer('B')">그렇다</button>
        <button onclick="answer('C')">아니다</button>
        <button onclick="answer('D')">전혀 아니다</button>
      </div>
    </div>

    <div id="result-screen" class="hidden card">
      <h1 id="result-type"></h1>
      <p id="result-desc"></p>

      <button onclick="location.reload()">
        다시 테스트하기
      </button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
