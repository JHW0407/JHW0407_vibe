```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌟 Premium MBTI Lab 🌟</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Pretendard',sans-serif;
    background:linear-gradient(135deg,#eef4ff,#ffeef8);
    color:#333;
    line-height:1.7;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:30px;
}

.hero{
    background:white;
    border-radius:30px;
    padding:50px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    margin-bottom:30px;
}

.hero h1{
    font-size:48px;
    margin-bottom:10px;
}

.hero p{
    color:#666;
    font-size:18px;
}

.question-card{
    background:white;
    border-radius:25px;
    padding:25px;
    margin:20px 0;
    box-shadow:0 6px 15px rgba(0,0,0,0.05);
}

.question-card h3{
    margin-bottom:15px;
}

label{
    display:block;
    margin:10px 0;
    padding:12px;
    border-radius:12px;
    background:#f5f7ff;
    cursor:pointer;
    transition:0.2s;
}

label:hover{
    background:#e8edff;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:#6c63ff;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
    transition:0.2s;
}

button:hover{
    opacity:0.9;
    transform:translateY(-2px);
}

.result{
    display:none;
    margin-top:40px;
}

.result-card{
    background:white;

}

    text-align:center;
}

.mbti-title h2{
    font-size:50px;
}

.emoji{
    font-size:100px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:30px;
}

.box{
    background:#f6f7ff;
    border-radius:20px;
    padding:20px;
}

.box h3{
    margin-bottom:10px;
}

.progress{
    background:#ddd;
    border-radius:999px;
    height:18px;
    overflow:hidden;
    margin-top:10px;
}

.progress-bar{
    height:100%;
    background:#6c63ff;
}

.footer{
    text-align:center;
    margin-top:40px;
    color:#666;
}

@media(max-width:768px){

.grid{
    grid-template-columns:1fr;
}

.hero h1{
    font-size:34px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="hero">
    <h1>🧠 Premium MBTI Lab</h1>
    <p>
        전문적인 성격 분석 시스템으로 당신의 성향을 자세히 알아보세요.
    </p>
</div>

<form id="mbtiForm"></form>

<button onclick="calculateMBTI()">
    결과 분석 시작 🚀
</button>

<div class="result" id="result"></div>

<div class="footer">
    Made with 💜 MBTI Psychology Project
</div>

</div>

<script>

const questions = [

["새로운 사람과 쉽게 친해진다.","E"],
["혼자 있는 시간이 꼭 필요하다.","I"],
["모임에서 먼저 말하는 편이다.","E"],
["깊고 조용한 대화를 선호한다.","I"],

["현실적인 정보가 중요하다.","S"],
["아이디어와 상상을 좋아한다.","N"],
["세부사항을 잘 기억한다.","S"],
["미래 가능성을 상상한다.","N"],

["논리적으로 판단하는 편이다.","T"],
["감정을 중요하게 생각한다.","F"],
["비판적 분석을 잘한다.","T"],
["공감 능력이 뛰어나다.","F"],

["계획적으로 움직인다.","J"],
["즉흥적인 상황을 즐긴다.","P"],
["할 일을 미리 끝낸다.","J"],
["마감 직전에 집중한다.","P"],

["활동적인 취미를 좋아한다.","E"],
["혼자 하는 취미가 편하다.","I"],
["실용적인 선택을 선호한다.","S"],
["창의적인 아이디어를 좋아한다.","N"],

["효율성이 중요하다.","T"],
["관계가 더 중요하다.","F"],
["정리정돈을 잘한다.","J"],
["자유로운 분위기를 좋아한다.","P"],

["새로운 경험을 즐긴다.","E"],
["조용한 환경이 편하다.","I"],
["현실적인 목표를 중시한다.","S"],
["상상력이 풍부한 편이다.","N"],

["객관적 판단을 한다.","T"],
["사람 감정을 먼저 고려한다.","F"],
["규칙적인 생활을 선호한다.","J"],
["유연한 생활을 좋아한다.","P"]

];

const results = {

INTJ:{
emoji:"🦉",
name:"전략가",
desc:"철저한 계획과 분석 능력을 가진 독립적인 전략형 성격입니다.",
strengths:[
"뛰어난 문제 해결 능력",
"장기적 계획 수립",
"독립성과 집중력",
"효율적인 사고"
],
weaknesses:[
"감정 표현 부족",
"완벽주의 성향",
"타인에게 차갑게 보일 수 있음"
],
improve:[
"감정 표현 연습",
"타인의 속도 존중하기",
"실수에 대한 유연함 기르기"
],
career:"연구원, 개발자, 전략가, 데이터 분석가",
relationship:"깊은 관계를 중요하게 여기며 신뢰를 오래 유지합니다."
},

INFP:{
emoji:"🌸",
name:"중재자",
desc:"따뜻하고 감성적이며 이상을 추구하는 성격입니다.",
strengths:[
"높은 공감 능력",
"창의적인 사고",
"배려심 깊음",
"가치 중심적"
],
weaknesses:[
"현실 회피 경향",
"감정 기복",
"결정 장애"
],
improve:[
"현실적 계획 세우기",
"자기 감정 객관화",
"실행력 강화"
],
career:"작가, 디자이너, 상담가, 예술가",
relationship:"상대의 감정을 잘 이해하며 깊은 정서적 교감을 추구합니다."
},

ENTP:{
emoji:"🦊",
name:"토론가",
desc:"창의적이고 도전적인 아이디어 뱅크형 성격입니다.",
strengths:[
"빠른 두뇌 회전",
"유머 감각",
"창의성",
"새로운 도전 선호"
],
weaknesses:[
"집중력 부족",
"루틴 싫어함",
"논쟁을 즐김"
],
improve:[
"꾸준함 기르기",
"실행력 강화",
"경청 습관 들이기"
],
career:"기획자, 창업가, 마케터, 방송인",
relationship:"즐겁고 자유로운 관계를 추구합니다."
},

ENFJ:{
emoji:"☀️",
name:"선도자",
desc:"사람을 이끄는 따뜻한 리더형 성격입니다.",
strengths:[
"리더십",
"배려심",
"동기부여 능력",
"높은 사교성"
],
weaknesses:[
"남 눈치를 많이 봄",
"감정 소모 심함",
"과한 책임감"
],
improve:[
"자기 돌봄 실천",
"거절 연습",
"혼자만의 시간 확보"
],
career:"교사, 리더, 상담사, HR",
relationship:"상대를 성장시키는 관계를 선호합니다."
}

};

const defaultResult = {
emoji:"✨",
name:"균형형",
desc:"다양한 성향이 균형 있게 나타나는 타입입니다.",
strengths:[
"유연한 사고",
"상황 적응 능력",
"다양한 관점 수용"
],
weaknesses:[
"우유부단함",
"정체성 혼란 가능성"
],
improve:[
"핵심 가치 정리",
"목표 구체화"
],
career:"다양한 분야 적응 가능",
relationship:"상황에 따라 다양한 관계 스타일을 보입니다."
};

const form = document.getElementById("mbtiForm");

questions.forEach((q,index)=>{

form.innerHTML += `

<div class="question-card">

<h3>Q${index+1}. ${q[0]}</h3>

<label>
<input type="radio" name="q${index}" value="${q[1]}" required>
 그렇다 👍
</label>

<label>
<input type="radio" name="q${index}" value="">
 아니다 👎
</label>

</div>

`;

});

function calculateMBTI(){

let scores = {
E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0
};

questions.forEach((q,index)=>{

const selected =
document.querySelector(`input[name=q${index}]:checked`);

if(selected && selected.value){

scores[selected.value]++;

}else{

const opposite = {
E:"I",
I:"E",
S:"N",
N:"S",
T:"F",
F:"T",
J:"P",
P:"J"
};

scores[opposite[q[1]]]++;

}

});

const type =
(scores.E >= scores.I ? "E":"I") +
(scores.S >= scores.N ? "S":"N") +
(scores.T >= scores.F ? "T":"F") +
(scores.J >= scores.P ? "J":"P");

const data = results[type] || defaultResult;

const totalEI = scores.E + scores.I;
const totalSN = scores.S + scores.N;
const totalTF = scores.T + scores.F;
const totalJP = scores.J + scores.P;

const ePercent = Math.round(scores.E/totalEI*100);
const sPercent = Math.round(scores.S/totalSN*100);
const tPercent = Math.round(scores.T/totalTF*100);
const jPercent = Math.round(scores.J/totalJP*100);

document.getElementById("result").style.display = "block";

document.getElementById("result").innerHTML = `

<div class="result-card">

<div class="mbti-title">

<div class="emoji">${data.emoji}</div>

<h2>${type}</h2>

<h3>${data.name}</h3>

<p>${data.desc}</p>

</div>

<div class="grid">

<div class="box">
<h3>💖 주요 강점</h3>
<ul>
${data.strengths.map(x=>`<li>${x}</li>`).join("")}
</ul>
</div>

<div class="box">
<h3>⚡ 약점 및 주의점</h3>
<ul>
${data.weaknesses.map(x=>`<li>${x}</li>`).join("")}
</ul>
</div>

<div class="box">
<h3>📈 성장 포인트</h3>
<ul>
${data.improve.map(x=>`<li>${x}</li>`).join("")}
</ul>
</div>

<div class="box">
<h3>💼 추천 분야</h3>
<p>${data.career}</p>

<h3 style="margin-top:15px;">💌 인간관계 스타일</h3>
<p>${data.relationship}</p>
</div>

</div>

<div class="box" style="margin-top:30px;">

<h3>📊 성향 분석</h3>

<p>E ↔ I (${ePercent}% 외향)</p>
<div class="progress">
<div class="progress-bar" style="width:${ePercent}%"></div>
</div>

<p style="margin-top:15px;">S ↔ N (${sPercent}% 현실형)</p>
<div class="progress">
<div class="progress-bar" style="width:${sPercent}%"></div>
</div>

<p style="margin-top:15px;">T ↔ F (${tPercent}% 사고형)</p>
<div class="progress">
<div class="progress-bar" style="width:${tPercent}%"></div>
</div>

<p style="margin-top:15px;">J ↔ P (${jPercent}% 계획형)</p>
<div class="progress">
<div class="progress-bar" style="width:${jPercent}%"></div>
</div>

</div>

</div>

`;

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

}

</script>

</body>
</html>
```
